			padding: 20px 0;

			margin-bottom: 15px;
		}

		@keyframes rgbFlow {
			0%   { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
			20%  { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
			40%  { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
			60%  { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
			80%  { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
			100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
		}

		.brand-logo-rgb {
			font-size: 35px;
			font-weight: 900;
			text-transform: uppercase;
			letter-spacing: 6px;
			margin: 0;
			display: block;
			animation: rgbFlow 3s linear infinite;
		}

		.dev-cred-rgb {
			font-size: 14px;
			font-family: 'Courier New', Courier, monospace;
			margin-top: 5px;
			display: block;
			font-weight: bold;
			animation: rgbFlow 3s linear infinite;
		}

		.rgb-line {
			height: 2px;
			width: 60%;
			margin: 10px auto;
			animation: rgbBg 3s linear infinite;
		}

		@keyframes rgbBg {
			0% { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
			33% { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
			66% { background: #0000ff; box-shadow: 0 0 8px #0000ff; }
			100% { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
		}
	</style>

	<script src="js/site.js"></script>
	<script>
		           const xmlhttp = new XMLHttpRequest();
								xmlhttp.onload = function() {
								  const myObj = JSON.parse(this.responseText);
								  document.getElementById("total_spiffs").innerHTML = myObj.total;
								  document.getElementById("used_spiffs").innerHTML = myObj.used;
								  document.getElementById("free_spiffs").innerHTML = myObj.free;
								  document.getElementById("eviltwin_path").innerHTML = myObj.eviltwin;
								  document.getElementById("pishing_path").innerHTML = myObj.pishing;
								  reloadlist();
								};
								xmlhttp.open("GET", "/filemanager.json");
								xmlhttp.send();
               function reloadlist() 
                     {
                        
                        var xhttp = new XMLHttpRequest();
                        xhttp.open("GET", "/reloadlist", true);
                        xhttp.send();
                        getlog();
                        getfile();
                      }
                function getlog() 
                      {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function() {
                          if (this.readyState == 4 && this.status == 200) {
                            document.getElementById("log").innerHTML = this.responseText;
                          }
                        };
                        xhttp.open("GET", "log", true);
                        xhttp.send();
                      }
                     
                  function getfile() 
                      {
                        var xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function() {
                          if (this.readyState == 4 && this.status == 200) {
                            document.getElementById("filelist").innerHTML = this.responseText;
                          }
                        };
                        xhttp.open("GET", "filelist", true);
                        xhttp.send();
                      }
                   
                </script>
