	<style type="text/css">
		/* =========================================
		   KUSTOMISASI RGB GMPRO87 (FULL VERSION)
		   ========================================= */
		.custom-header {
			text-align: center;
			padding: 20px 0;
			background-color: #23272A; 
			border-bottom: 2px solid #444;
			margin-bottom: 15px;
		}

		@keyframes rgbFlow {
			0%   { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
			20%  { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
			40%  { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
			60%  { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
			80%  { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
			100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
		}

		.brand-logo-rgb {
			font-size: 35px;
			font-weight: 900;
			text-transform: uppercase;
			letter-spacing: 6px;
			margin: 0;
			display: block;
			animation: rgbFlow 3s linear infinite;
		}

		.dev-cred-rgb {
			font-size: 14px;
			font-family: 'Courier New', Courier, monospace;
			margin-top: 5px;
			display: block;
			font-weight: bold;
			animation: rgbFlow 3s linear infinite;
		}

		.rgb-line {
			height: 2px;
			width: 60%;
			margin: 10px auto;
			animation: rgbBg 3s linear infinite;
		}

		@keyframes rgbBg {
			0% { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
			33% { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
			66% { background: #0000ff; box-shadow: 0 0 8px #0000ff; }
			100% { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
		}
		/* ========================================= */

		#myProgress {
		  width: 100%;
		  background-color: grey;
		  border-radius: 5px;
		  overflow: hidden;
		}

		#myBar {
		  width: 0%;
		  height: 30px;
		  background-color: red;
		  text-align: center;
		  line-height: 30px;
		  color: white;
		  font-weight: bold;
		}
	</style>

	<script type="text/javascript">
		var i = 0;
		function move() {
			if (i == 0) {
				i = 1;
				var elem = document.getElementById("myBar");
				var width = 0;
				var id = setInterval(frame, 150);
				function frame() {
					if (width >= 100) {
						clearInterval(id);
						check();
						i = 0;
					} else {
						width++;
						elem.style.width = width + "%";
						elem.innerHTML = width + "%";
					}
				}
			}
		} 

		function check() {
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					document.getElementById("status").innerHTML = this.responseText;
				}
			};
			xhttp.open("GET", "connection_status", true);
			xhttp.send();
		}
	</script>
</head>
